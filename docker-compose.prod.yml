# Production stack: Nginx + Backend + Postgres + Redis (no frontend).
# Usage: create .env from deploy/.env.example, then:
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: letschat-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-letschat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-letschat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-letschat} -d ${POSTGRES_DB:-letschat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: letschat-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: letschat-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-letschat}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-letschat}?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
      PORT: 4000
    volumes:
      - backend_uploads:/app/uploads
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma generate &&
        node dist/server.js
      "

  nginx:
    image: nginx:alpine
    container_name: letschat-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
